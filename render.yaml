services:
  - type: web
    name: opticrop-ai
    env: python
    buildCommand: pip install -r requirements.txt && python generate_dataset.py && python train_model.py
    startCommand: gunicorn app:app --config gunicorn.conf.py
    envVars:
      - key: SECRET_KEY
        value: opticrop-render-secret-2024
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: RENDER
        value: "true"
